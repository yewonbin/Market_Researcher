  - name: "구글뉴스 · 인슈어테크(KR)"
    url: "https://news.google.com/rss/search?q=%EC%9D%B8%EC%8A%88%EC%96%B4%ED%85%8C%ED%81%AC&hl=ko&gl=KR&ceid=KR:ko"
  - name: "구글뉴스 · 보험금 청구 자동화(KR)"
    url: "https://news.google.com/rss/search?q=%EB%B3%B4%ED%97%98%EA%B8%88+%EC%B2%AD%EA%B5%AC+%EC%9E%90%EB%8F%99%ED%99%94&hl=ko&gl=KR&ceid=KR:ko"
  - name: "구글뉴스 · 보험 디지털 혁신(KR)"
    url: "https://news.google.com/rss/search?q=%EB%B3%B4%ED%97%98%EC%82%AC+%EB%94%94%EC%A7%80%ED%84%B8+%ED%98%81%EC%8B%A0&hl=ko&gl=KR&ceid=KR:ko"
  - name: "Google News · insurance AI underwriting(EN)"
