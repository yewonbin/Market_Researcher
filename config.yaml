# Gemini 모델(무료 등급).
#   gemini-2.0-flash       → 무료 분당 15회 (권장, 빠름)
#   gemini-2.5-flash-lite  → 무료 분당 15회 (가장 빠름)
#   gemini-2.5-flash       → 무료 분당 5회 (품질 ↑, 느림)
model: gemini-2.0-flash

# 분당 요청 수 상한(무료 등급 보호). 위 모델의 무료 RPM 보다 살짝 낮게 두세요.
#   gemini-2.0-flash / 2.5-flash-lite → 12,   gemini-2.5-flash → 4
rpm: 12

# 한 번 실행 시 분석할 최대 기사 수(API 비용 상한). 신규 기사 중 상한까지만 분석.
max_articles: 25

# 기사 1건의 보험산업 관련도(relevance, 1~5) 가 이 값 미만이면 리포트에서 제외.
min_relevance: 2

# 리포트 제목/메일 제목 접두어
report_title: "AI 보험·금융 트렌드 리서치"

